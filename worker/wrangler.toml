name = "pravys-market-bot"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Keep the Worker inside the free tier:
# - 100k requests / day (one Telegram webhook per message is tiny volume)
# - 10ms CPU per request on bundled plan; we use async / await so wall-clock
#   time goes to Gemini and Upstash (external), not CPU ticks.
workers_dev = true

[vars]
GOOGLE_AI_DEFAULT_MODEL = "gemini-2.5-pro"
# CAN SLIM playbook URI from Gemini Files API. Re-upload via
# `scripts/upload_playbook.py` if Gemini reports it expired.
CANSLIM_PLAYBOOK_FILE_ID = "https://generativelanguage.googleapis.com/v1beta/files/b68ifevz15qk"
# Which repo the scheduled handler dispatches workflows against.
GITHUB_REPO = "impravin22/pravys-market-bot"
GITHUB_REF = "main"

# Cron triggers drive the scheduled() handler, which dispatches the
# equivalent GitHub Actions workflow via workflow_dispatch. Keep the
# expressions in sync with CRON_TO_WORKFLOW in src/index.ts.
#
# Why CF cron instead of GitHub's native schedule: GitHub cron routinely
# runs 15–60 min late at top-of-hour (e.g. evening-pulse 2026-04-14 fired
# at 11:19 UTC for a 10:15 UTC cron — 64 min late). Cloudflare cron is
# sub-minute accurate, so pre-market / post-close timing is reliable.
[triggers]
crons = [
  "0 3 * * 2-6",     # Morning pulse — 03:00 UTC = 08:30 IST / 11:00 TPE, Mon–Fri
  "0 14 * * 7",      # Weekly Recap — 14:00 UTC = 19:30 IST / 22:00 TPE, Saturday (CF DOW 7=Sat)
  "0 2 * * *",       # SMOKE: temporary near-future cron to surface scheduled() error via Telegram canary. Revert immediately after fire.
]

# Enable Workers Observability so scheduled() invocations appear in the
# Cloudflare dashboard Logs tab. Free tier includes this.
[observability]
enabled = true
