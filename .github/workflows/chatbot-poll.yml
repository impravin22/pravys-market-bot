name: Chatbot Poll

# Polls Telegram for new @mentions / DMs and streams a Gemini reply back.
# State lives in Upstash Redis; no git-branch I/O.
#
# Cron runs every 2 min: GitHub's scheduler is best-effort and public repos
# routinely drop 1-min ticks under load. 2-min intervals land reliably and
# stay well inside the Upstash 10k-commands/day free-tier budget even if
# the owner chats constantly.
on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch: {}

concurrency:
  group: chatbot-poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - run: uv sync --frozen

      - name: Run chatbot poll
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_OWNER_USER_ID: ${{ secrets.TELEGRAM_OWNER_USER_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_AI_DEFAULT_MODEL: gemini-2.5-pro
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          BOT_USER_ID_SALT: ${{ secrets.BOT_USER_ID_SALT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
        run: uv run python -m jobs.chatbot_poll
