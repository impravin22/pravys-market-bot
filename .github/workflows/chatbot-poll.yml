name: Chatbot Poll (DEPRECATED)

# Replaced by the Cloudflare Worker webhook (`worker/`) which delivers
# sub-3-second replies instead of waiting on the cron floor. This
# workflow is kept manual-only as a fallback if the Worker is ever
# disabled — it will still pick up queued Telegram updates via long-
# poll if the webhook is removed via `deleteWebhook`.
on:
  workflow_dispatch: {}

concurrency:
  group: chatbot-poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - run: uv sync --frozen

      - name: Run chatbot poll
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_OWNER_USER_ID: ${{ secrets.TELEGRAM_OWNER_USER_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_AI_DEFAULT_MODEL: gemini-2.5-pro
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          BOT_USER_ID_SALT: ${{ secrets.BOT_USER_ID_SALT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
        run: uv run python -m jobs.chatbot_poll
