name: Market Pulse — Morning

on:
  schedule:
    # 11:00 Asia/Taipei = 08:30 Asia/Kolkata = 03:00 UTC, Mon–Fri
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Skip the NSE trading-day check (for testing only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - name: Send morning pulse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_AI_DEFAULT_MODEL: gemini-2.5-pro
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
        run: uv run python -m jobs.morning_pulse
