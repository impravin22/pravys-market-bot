name: Deploy Worker

# Auto-deploys the Cloudflare Worker on every push to main that touches
# `worker/**`. Wrangler uses CLOUDFLARE_API_TOKEN (scoped to Edit Workers
# Scripts) stored in GitHub Actions secrets — no interactive login needed.
on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
