name: Deploy Worker

# Auto-deploys the Cloudflare Worker on every push to main that touches
# `worker/**`. Pushes runtime secrets to the Worker (idempotent), deploys
# via wrangler, smoke-tests the health endpoint, then sets the Telegram
# webhook to the freshly-deployed URL.
#
# DO NOT enable `set -x` in the secret-injection step — it would echo
# secrets into the public Actions log.
on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Push runtime secrets to Worker
        run: |
          set -euo pipefail
          push_required() {
            local name="$1"; local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Required secret $name is empty — refusing to deploy a broken Worker"
              exit 1
            fi
            # `printf %s` avoids the trailing newline `echo` would append.
            printf '%s' "$value" | npx wrangler secret put "$name"
          }
          push_optional() {
            local name="$1"; local value="$2"
            if [ -z "$value" ]; then
              echo "::notice::Skipping optional secret $name (empty)"
              return
            fi
            printf '%s' "$value" | npx wrangler secret put "$name"
          }
          push_required TELEGRAM_BOT_TOKEN '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          push_required TELEGRAM_CHAT_ID '${{ secrets.TELEGRAM_CHAT_ID }}'
          push_required TELEGRAM_WEBHOOK_SECRET '${{ secrets.TELEGRAM_WEBHOOK_SECRET }}'
          push_required GOOGLE_API_KEY '${{ secrets.GOOGLE_API_KEY }}'
          push_required UPSTASH_REDIS_REST_URL '${{ secrets.UPSTASH_REDIS_REST_URL }}'
          push_required UPSTASH_REDIS_REST_TOKEN '${{ secrets.UPSTASH_REDIS_REST_TOKEN }}'
          push_required BOT_USER_ID_SALT '${{ secrets.BOT_USER_ID_SALT }}'
          push_optional TELEGRAM_OWNER_USER_ID '${{ secrets.TELEGRAM_OWNER_USER_ID }}'

      - name: Deploy Worker
        id: deploy
        run: |
          set -euo pipefail
          npx wrangler deploy 2>&1 | tee deploy.log
          worker_url=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -n1)
          if [ -z "$worker_url" ]; then
            echo "::error::Failed to extract Worker URL from deploy output"
            exit 1
          fi
          echo "worker_url=$worker_url" >> "$GITHUB_OUTPUT"

      - name: Smoke-test Worker health endpoint (best-effort)
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: |
          set -uo pipefail
          # Cloudflare issues TLS for a new `*.<account>.workers.dev` subdomain
          # only after the first deploy, and propagation can take up to ~1 hour.
          # We don't want to fail every deploy during that window, so this step
          # warns and keeps going. The next step still registers setWebhook,
          # which Telegram validates lazily on delivery, not at set time.
          response=$(curl -sSf --max-time 15 "$WORKER_URL" 2>&1) || response=""
          if [ "$response" = "pravys-market-bot worker OK" ]; then
            echo "::notice::Worker health check OK"
          else
            echo "::warning::Worker health check could not confirm readiness (likely TLS propagation delay)."
            echo "::warning::Deploy continues; Telegram will begin delivering updates once the cert is live."
          fi

      - name: Set Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: |
          set -euo pipefail
          result=$(curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=${WORKER_URL}" \
            -d "secret_token=${TELEGRAM_WEBHOOK_SECRET}" \
            -d "allowed_updates=[\"message\"]" \
            -d "drop_pending_updates=false")
          echo "$result" | python3 -m json.tool
          # Verify Telegram actually accepted it.
          echo "$result" | python3 -c "import sys, json; sys.exit(0 if json.load(sys.stdin).get('ok') else 1)" || {
            echo "::error::setWebhook reported failure"
            exit 1
          }
