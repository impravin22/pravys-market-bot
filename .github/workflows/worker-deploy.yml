name: Deploy Worker

# Auto-deploys the Cloudflare Worker on every push to main that touches
# `worker/**`. Pushes runtime secrets to the Worker before each deploy
# (idempotent — Cloudflare keeps the latest value), then deploys.
on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      # Push runtime secrets first. Wrangler skips re-deploy if values
      # are unchanged; first run on a fresh Worker creates them.
      - name: Push runtime secrets to Worker
        run: |
          set -euo pipefail
          push_secret() {
            local name="$1"; local value="$2"
            if [ -z "$value" ]; then
              echo "skip $name (empty)"
              return
            fi
            echo "$value" | npx wrangler secret put "$name"
          }
          push_secret TELEGRAM_BOT_TOKEN '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          push_secret TELEGRAM_CHAT_ID '${{ secrets.TELEGRAM_CHAT_ID }}'
          push_secret TELEGRAM_OWNER_USER_ID '${{ secrets.TELEGRAM_OWNER_USER_ID }}'
          push_secret TELEGRAM_WEBHOOK_SECRET '${{ secrets.TELEGRAM_WEBHOOK_SECRET }}'
          push_secret GOOGLE_API_KEY '${{ secrets.GOOGLE_API_KEY }}'
          push_secret UPSTASH_REDIS_REST_URL '${{ secrets.UPSTASH_REDIS_REST_URL }}'
          push_secret UPSTASH_REDIS_REST_TOKEN '${{ secrets.UPSTASH_REDIS_REST_TOKEN }}'
          push_secret BOT_USER_ID_SALT '${{ secrets.BOT_USER_ID_SALT }}'

      - name: Deploy Worker
        id: deploy
        run: |
          set -euo pipefail
          # Capture wrangler output so we can extract the Worker URL.
          npx wrangler deploy 2>&1 | tee deploy.log
          worker_url=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -n1)
          if [ -z "$worker_url" ]; then
            echo "Failed to extract Worker URL from deploy output" >&2
            exit 1
          fi
          echo "worker_url=$worker_url" >> "$GITHUB_OUTPUT"

      # Register the Telegram webhook to point at the freshly-deployed
      # Worker. setWebhook is idempotent; re-running with the same URL
      # is a no-op.
      - name: Set Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: |
          set -euo pipefail
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=${WORKER_URL}" \
            -d "secret_token=${TELEGRAM_WEBHOOK_SECRET}" \
            -d "allowed_updates=[\"message\"]" \
            -d "drop_pending_updates=false" | python3 -m json.tool
