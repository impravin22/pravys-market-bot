name: Market Pulse — Evening

on:
  schedule:
    # 18:15 Asia/Taipei = 15:45 Asia/Kolkata (15 min after NSE close) = 10:15 UTC, Mon–Fri
    - cron: "15 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - name: Send evening recap
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_AI_DEFAULT_MODEL: gemini-2.5-pro
        run: uv run python -m jobs.evening_recap
