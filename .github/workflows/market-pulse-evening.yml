name: Market Pulse — Evening

# Triggered by the Cloudflare Worker's scheduled() handler at 10:15 UTC
# Mon-Fri (15:45 IST / 18:15 TPE, 15 min after NSE close). See
# worker/src/index.ts for why we moved off GitHub's native cron.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - name: Send evening recap
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_AI_DEFAULT_MODEL: gemini-2.5-pro
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          BOT_USER_ID_SALT: ${{ secrets.BOT_USER_ID_SALT }}
        run: uv run python -m jobs.evening_recap
